<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; color: #1e293b; font-size: 13px; }

    /* Header */
    .hdr { background: #0f2d5c; color: #fff; padding: 13px 20px; display: flex; align-items: center; justify-content: space-between; }
    .hdr h1 { font-size: 17px; font-weight: 700; }
    .hdr-sub { font-size: 11px; color: #93c5fd; margin-top: 2px; }
    .btn-import { background: #2563eb; color: #fff; border: none; padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap; }
    .btn-import:hover { background: #1d4ed8; }

    /* Tabs */
    .tabs { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 0 20px; display: flex; }
    .tab { padding: 10px 18px; cursor: pointer; font-size: 13px; font-weight: 500; color: #64748b; border-bottom: 3px solid transparent; }
    .tab.active { color: #0f2d5c; border-bottom-color: #0f2d5c; font-weight: 600; }

    /* RAG cards */
    .rag-row { display: flex; gap: 10px; padding: 12px 20px 10px; }
    .rag-card { flex: 1; background: #fff; border-radius: 8px; padding: 10px 14px; border: 2px solid transparent; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: box-shadow .15s; }
    .rag-card:hover { box-shadow: 0 3px 10px rgba(0,0,0,.08); }
    .rag-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .rag-dot-ALL{background:#94a3b8} .rag-dot-GREEN{background:#16a34a} .rag-dot-AMBER{background:#d97706} .rag-dot-RED{background:#dc2626}
    .c-all{border-color:#e2e8f0} .c-all.ac{border-color:#64748b;background:#f8fafc}
    .c-green{border-color:#bbf7d0} .c-green.ac{border-color:#16a34a;background:#f0fdf4}
    .c-amber{border-color:#fde68a} .c-amber.ac{border-color:#d97706;background:#fffbeb}
    .c-red{border-color:#fecaca}   .c-red.ac{border-color:#dc2626;background:#fef2f2}
    .rc-count{font-size:22px;font-weight:700;line-height:1} .rc-label{font-size:11px;color:#64748b;font-weight:500;text-transform:uppercase;letter-spacing:.4px} .rc-pct{font-size:11px;color:#94a3b8}

    /* Criteria + Filter bar */
    .criteria { padding: 5px 20px 6px; font-size: 11px; color: #64748b; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
    .cg{color:#15803d;font-weight:600} .ca{color:#b45309;font-weight:600} .cr{color:#b91c1c;font-weight:600}
    .fbar { padding: 8px 20px; display: flex; align-items: center; gap: 8px; background: #fff; border-bottom: 1px solid #e2e8f0; flex-wrap: wrap; }
    .search { padding: 5px 10px; border: 1px solid #e2e8f0; border-radius: 5px; font-size: 12px; width: 200px; outline: none; background: #fafafa; }
    .search:focus { border-color: #3b82f6; background: #fff; }
    .chk-lbl { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #64748b; cursor: pointer; }
    .fbar-right { margin-left: auto; display: flex; gap: 6px; align-items: center; }
    .count-txt { font-size: 12px; color: #94a3b8; }
    .btn-sm { padding: 4px 10px; border: 1px solid #e2e8f0; border-radius: 5px; font-size: 11px; cursor: pointer; background: #fff; color: #64748b; font-weight: 500; }
    .btn-sm.on { background: #0f2d5c; color: #fff; border-color: #0f2d5c; }
    .active-filters { padding: 4px 20px; background: #eff6ff; border-bottom: 1px solid #bfdbfe; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; font-size: 11px; color: #1d4ed8; }
    .filter-chip { display: flex; align-items: center; gap: 4px; background: #dbeafe; border: 1px solid #93c5fd; border-radius: 10px; padding: 2px 8px; font-size: 11px; cursor: pointer; }
    .filter-chip:hover { background: #bfdbfe; }
    .clear-all { margin-left: 4px; color: #6b7280; cursor: pointer; font-size: 11px; }
    .clear-all:hover { color: #111; }

    /* Table */
    .tbl-wrap { overflow-x: auto; overflow-y: auto; max-height: calc(100vh - 270px); }
    table { border-collapse: collapse; min-width: max-content; background: #fff; width: 100%; }

    /* Sticky header rows */
    thead { background: #0f172a; }
    thead tr { background: #0f172a; }
    thead th { position: sticky; top: 0; background: #1e293b; color: #cbd5e1; font-size: 11px; font-weight: 600; white-space: nowrap; z-index: 20; }
    thead tr:first-child th { top: 0; }
    thead tr:last-child th { position: relative !important; top: auto; z-index: auto; }
    thead th.grp { background: #0f172a; color: #64748b; font-size: 10px; text-transform: uppercase; letter-spacing: .5px; text-align: center; height: 28px; line-height: 28px; padding: 0 6px; border-bottom: 1px solid #1e293b; }
    /* Column group alternating: dark blue vs slightly lighter blue-grey */
    thead th.grp.ga { background: #0f2040; }
    thead th.grp.gb { background: #152238; }

    /* Sortable+filterable header cells */
    .sh { padding: 0; position: relative; border-right: 1px solid #334155; border-bottom: 1px solid #475569; }
    .sh-inner { display: flex; align-items: stretch; height: 26px; }
    .sh-sort { flex: 1; display: flex; align-items: center; padding: 0 6px; cursor: pointer; gap: 3px; font-size: 11px; font-weight: 600; color: #cbd5e1; white-space: nowrap; min-width: 0; }
    .sh-sort:hover { background: rgba(255,255,255,.08); color: #f1f5f9; }
    .sh-sort.sa { color: #60a5fa; }
    .sh-filt { display: flex; align-items: center; padding: 0 5px; cursor: pointer; border-left: 1px solid #334155; color: #64748b; font-size: 10px; }
    .sh-filt:hover { background: rgba(255,255,255,.08); color: #93c5fd; }
    .sh-filt.fa { color: #60a5fa; background: rgba(96,165,250,.15); }
    .si { font-size: 9px; opacity: .7; }

    /* Non-filterable simple header */
    .sh-plain { padding: 0 8px; height: 26px; line-height: 26px; font-size: 11px; font-weight: 600; color: #94a3b8; border-right: 1px solid #334155; border-bottom: 1px solid #475569; }

    /* Sticky name/rag/label/type headers */
    thead th.name-h { text-align: left; background: #07111f; border-right: 2px solid #4b5563; min-width: 175px; max-width: 235px; }
    thead th.rag-h  { text-align: center; background: #07111f; border-right: 1px solid #4b5563; min-width: 62px; }
    thead th.type-h { text-align: left; background: #07111f; border-right: 2px solid #4b5563; min-width: 120px; }
    thead th.lbl-h  { text-align: left; background: #07111f; border-right: 2px solid #4b5563; min-width: 100px; }
    thead th.gsep   { border-right: 2px solid #475569 !important; }

    /* Body */
    tbody tr { border-bottom: 1px solid #e8eef4; }
    tbody tr.rG { background: #e8f8ed; border-left: 3px solid #16a34a; }
    tbody tr.rA { background: #fef3cd; border-left: 3px solid #d97706; }
    tbody tr.rR { background: #fde8e8; border-left: 3px solid #dc2626; }
    tbody tr:hover td { background: rgba(203,213,225,0.45) !important; }
    tbody td { padding: 6px 8px; white-space: nowrap; text-align: right; border-right: 1px solid #e2e8f0; font-size: 12px; }
    tbody td.name-c { text-align: left; font-weight: 500; padding: 6px 10px; border-right: 2px solid #cbd5e1; min-width: 175px; max-width: 235px; white-space: normal; }
    tbody td.rag-c  { text-align: center; border-right: 1px solid #cbd5e1; }
    tbody td.type-c { text-align: left; padding: 5px 8px; border-right: 2px solid #cbd5e1; }
    tbody td.lbl-c  { text-align: left; padding: 4px 6px; border-right: 2px solid #cbd5e1; cursor: pointer; min-width: 100px; }
    tbody td.gsep   { border-right: 2px solid #cbd5e1 !important; }

    /* Column group data cell backgrounds — blue/grey only (tbody only) */
    tbody .ga-cell { background: rgba(219,234,254,0.3); }   /* blue-100 tint */
    tbody .gb-cell { background: rgba(241,245,249,0.6); }   /* slate-100 tint */
    /* Sub-header cells match the group header above them */
    thead th.ga-cell { background: #0f2040 !important; color: #94a3b8; }
    thead th.gb-cell { background: #152238 !important; color: #94a3b8; }

    /* Badges */
    .rag-badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 700; letter-spacing: .4px; }
    .rb-GREEN{background:#bbf7d0;color:#15803d} .rb-AMBER{background:#fef08a;color:#92400e} .rb-RED{background:#fca5a5;color:#991b1b}
    .exc-badge { display: inline-block; margin-left: 4px; padding: 1px 5px; border-radius: 3px; font-size: 9px; background: #dbeafe; color: #1e40af; font-weight: 600; }
    .plr-badge { display: inline-block; margin-left: 4px; padding: 1px 5px; border-radius: 3px; font-size: 9px; background: #ede9fe; color: #5b21b6; font-weight: 600; }
    .type-pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; white-space: nowrap; }
    .tp-Workgroup{background:#dbeafe;color:#1e40af} .tp-Council{background:#ede9fe;color:#5b21b6}
    .tp-Integrated{background:#d1fae5;color:#065f46} .tp-Specialty{background:#fef3c7;color:#78350f}
    .tp-Steering{background:#f1f5f9;color:#475569} .tp-IT{background:#fce7f3;color:#9d174d}

    /* Value colours */
    .npos{color:#b91c1c;font-weight:600} .nneg{color:#15803d;font-weight:600} .nzero{color:#94a3b8} .vnil{color:#cbd5e1}
    .pgrn{color:#15803d;font-weight:600} .pamb{color:#b45309;font-weight:600} .pred{color:#b91c1c;font-weight:600}

    /* Label cell */
    .lbl-val{color:#1e293b;font-size:11px} .lbl-ph{color:#cbd5e1;font-size:11px;font-style:italic}
    .lbl-input{width:100%;border:1px solid #93c5fd;border-radius:3px;padding:2px 5px;font-size:11px;outline:none;background:#fff}

    /* Filter dropdown */
    .fdrop { position: fixed; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; box-shadow: 0 8px 28px rgba(0,0,0,.15); z-index: 9999; min-width: 190px; max-height: 320px; display: flex; flex-direction: column; }
    .fdrop-head { padding: 8px 10px 6px; border-bottom: 1px solid #f1f5f9; display: flex; gap: 6px; }
    .fdrop-btn { padding: 3px 8px; font-size: 11px; border: 1px solid #e2e8f0; border-radius: 4px; cursor: pointer; background: #fff; color: #374151; }
    .fdrop-btn:hover { background: #f8fafc; }
    .fdrop-list { overflow-y: auto; flex: 1; padding: 4px 0; }
    .fdrop-opt { display: flex; align-items: center; gap: 7px; padding: 4px 12px; cursor: pointer; font-size: 12px; color: #374151; }
    .fdrop-opt:hover { background: #f8fafc; }
    .fdrop-opt input { cursor: pointer; accent-color: #2563eb; }

    /* Misc */
    .empty { text-align: center; padding: 50px; color: #94a3b8; }
    .drop-ov { position: fixed; inset: 0; background: rgba(15,45,92,.88); display: flex; align-items: center; justify-content: center; z-index: 10000; }
    .drop-box { background: #fff; border-radius: 14px; padding: 44px 60px; text-align: center; border: 3px dashed #3b82f6; }
    .drop-box h2 { font-size: 20px; font-weight: 700; color: #0f2d5c; margin-bottom: 8px; }
  </style>

// ── Helpers ────────────────────────────────────────────────────────────
const qc=s=>s?String(s).replace(/^"+|"+$/g,'').trim():'';
const calcPct=(start,exit)=>(!start||start===0)?null:((start-exit)/start*100).toFixed(1)+'%';
const calcAppRag=(allPct,decPct)=>{const a=parsePct(allPct)??0,d=parsePct(decPct)??0,v=Math.min(a,d);return v>=30?'GREEN':v>=15?'AMBER':'RED';};
const calcWgRag=decPct=>{const v=parsePct(decPct)??0;return v>=30?'GREEN':v>=15?'AMBER':'RED';};

function parsePct(s) {
  if (s === null || s === undefined) return null;
  const n = parseFloat(String(s).replace('%','').replace('\u2191','').trim());
  return isNaN(n) ? null : n;
}
function pctCls(s) {
  const v = parsePct(s);
  if (v === null) return 'vnil';
  if (v < 0) return 'pred';
  if (v >= 30) return 'pgrn';
  if (v >= 15) return 'pamb';
  return 'pred';
}
function pctBg(s) {
  const v = parsePct(s);
  if (v === null) return {};
  if (v < 0)   return {background:'rgba(252,165,165,0.45)'};
  if (v >= 30) return {background:'rgba(187,247,208,0.5)'};
  if (v >= 15) return {background:'rgba(253,230,138,0.45)'};
  return {background:'rgba(252,165,165,0.45)'};
}
function netBg(n) {
  if (n === null || n === undefined || n === 0) return {};
  return n < 0 ? {background:'rgba(187,247,208,0.4)'} : {background:'rgba(252,165,165,0.4)'};
}
function PctV({s}) {
  if (s === null || s === undefined) return <span className="vnil">&#8212;</span>;
  const cls = pctCls(s);
  const up = String(s).includes('\u2191');
  return <span className={cls}>{String(s).replace('\u2191','').trim()}{up?' \u2191':''}</span>;
}
function NetV({n}) {
  if (n === null || n === undefined) return <span className="vnil">&#8212;</span>;
  const cls = n<0?'nneg':n>0?'npos':'nzero';
  return <span className={cls}>{n>0?'+':''}{n.toLocaleString()}</span>;
}
function Num({n}) {
  if (n === null || n === undefined) return <span className="vnil">&#8212;</span>;
  return <>{n.toLocaleString()}</>;
}
function ragOrd(r){return r==='RED'?0:r==='AMBER'?1:r==='GREEN'?2:3}
function typeOrd(t){const o=['Workgroup','Council','Integrated Workstream','Specialty Content','Steering Committee','IT'];const i=o.indexOf(t);return i===-1?99:i}
function typeCls(t){if(!t)return'';if(t==='IT')return'IT';if(t==='Workgroup')return'Workgroup';if(t==='Council')return'Council';if(t.startsWith('Integrated'))return'Integrated';if(t.startsWith('Specialty'))return'Specialty';if(t.startsWith('Steering'))return'Steering';return'Workgroup'}
function ragRowCls(r){return r==='GREEN'?'rG':r==='AMBER'?'rA':r==='RED'?'rR':''}

// Net / Pct categories for filtering
function netCat(n) { if(n===null||n===undefined)return'Unknown'; if(n<0)return'Reduction'; if(n>0)return'Increase'; return'No change'; }
function pctCat(s) {
  const v = parsePct(s);
  if(v===null)return'Unknown';
  if(v<0)return'Increase (negative)';
  if(v>=30)return'GREEN > 30%';
  if(v>=15)return'AMBER 15-30%';
  return'RED < 15%';
}

// ── Column filter dropdown ──────────────────────────────────────────────
const NET_CATS  = ['Reduction','No change','Increase'];
const PCT_CATS  = ['GREEN > 30%','AMBER 15-30%','RED < 15%','Increase (negative)'];
const RAG_VALS  = ['GREEN','AMBER','RED'];

function FilterDrop({colKey, items, labels, itemType, colFilters, setColFilters, pos, onClose}) {
  const stopProp = e => { e.stopPropagation(); e.nativeEvent&&e.nativeEvent.stopImmediatePropagation(); };

  let options = [];
  if (colKey === 'rag')       options = RAG_VALS;
  else if (colKey === 'type') options = [...new Set(items.map(i=>i.wgType||'').filter(Boolean))].sort();
  else if (colKey === 'label') {
    const ls = new Set(Object.values(labels[itemType]||{}).filter(Boolean));
    options = ['(No label)', ...[...ls].sort()];
  }
  else if (colKey === 'decNetCat' || colKey === 'allNetCat') options = NET_CATS;
  else if (colKey === 'decPctCat' || colKey === 'allPctCat') options = PCT_CATS;

  const active = colFilters[colKey] || new Set();
  const allSelected = active.size === 0;

  const toggle = (val) => {
    setColFilters(prev => {
      const s = new Set(prev[colKey] || []);
      if(s.has(val)) s.delete(val); else s.add(val);
      return {...prev, [colKey]: s};
    });
  };
  const selectAll = () => setColFilters(prev => {const n={...prev};delete n[colKey];return n;});

  return (
    <div className="fdrop" style={{top:pos.top, left:pos.left}} onClick={stopProp}>
      <div className="fdrop-head">
        <button className="fdrop-btn" onClick={selectAll}>Select All</button>
        <button className="fdrop-btn" onClick={()=>{setColFilters(prev=>({...prev,[colKey]:new Set(options)}));onClose();}}>None</button>
        <button className="fdrop-btn" style={{marginLeft:'auto'}} onClick={onClose}>Done</button>
      </div>
      <div className="fdrop-list">
        {options.map(opt => {
          const checked = allSelected || active.has(opt);
          return (
            <label key={opt} className="fdrop-opt">
              <input type="checkbox" checked={checked} onChange={()=>toggle(opt)} />
              {opt}
            </label>
          );
        })}
      </div>
    </div>
  );
}

// ── Sortable+filterable header ──────────────────────────────────────────
function SH({label, sk, fk, sortKey, tSort, colFilters, openFilt, className, style}) {
  const sortActive = sortKey === sk;
  const filtActive = fk && colFilters[fk] && colFilters[fk].size > 0;
  return (
    <th className={'sh'+(className?' '+className:'')} style={style}>
      <div className="sh-inner">
        <div className={'sh-sort'+(sortActive?' sa':'')} onClick={()=>sk&&tSort(sk)}>
          {label}
          {sk && <span className="si">{sortActive?(sortKey===sk&&'asc'?'\u2191':'\u2193'):'\u21C5'}</span>}
        </div>
        {fk && (
          <div className={'sh-filt'+(filtActive?' fa':'')} onClick={e=>openFilt(fk,e)} title="Filter">
            {filtActive ? '\u25BC' : '\u25BC'}
          </div>
        )}
      </div>
    </th>
  );
}

// ── Editable label cell ─────────────────────────────────────────────────
function LabelCell({itemType, name, labels, onSave}) {
  const [editing, setEditing] = React.useState(false);
  const [val, setVal] = React.useState('');
  React.useEffect(()=>setVal(labels[itemType]?.[name]||''), [labels,itemType,name]);
  const commit = () => { onSave(itemType,name,val.trim()); setEditing(false); };
  if (editing) return (
    <td className="lbl-c" onClick={e=>e.stopPropagation()}>
      <input className="lbl-input" autoFocus value={val} onChange={e=>setVal(e.target.value)}
        onBlur={commit} onKeyDown={e=>{if(e.key==='Enter')commit();if(e.key==='Escape'){setVal(labels[itemType]?.[name]||'');setEditing(false);}}} />
    </td>
  );
  const cur = labels[itemType]?.[name];
  return (
    <td className="lbl-c" title="Click to edit" onClick={()=>setEditing(true)}>
      {cur ? <span className="lbl-val">{cur}</span> : <span className="lbl-ph">+ label</span>}
    </td>
  );
}

function parseScorecard(wb, wgTypeMap) {
  const sp=v=>{if(v===null||v===undefined)return null;if(typeof v==='string')return v.trim()||null;return v;};
  const apps=[];
  const as=wb.Sheets['App Scorecard'];
  if(as){const rows=XLSX.utils.sheet_to_json(as,{header:1,defval:null});
    for(let i=4;i<rows.length;i++){const r=rows[i];if(!r||!r[0])continue;const name=String(r[0]).trim();if(!name)continue;
      apps.push({name,rag:sp(r[1]),comment:sp(r[2]),
        allTasks:{start:r[3],exit:r[4],net:r[5],pct:sp(r[6]),wk:r[7]},
        bw1Tasks:{start:r[8],exit:r[9],net:r[10],pct:sp(r[11]),wkMay:r[12],critBuild:r[13]},
        decision:{start:r[14],exit:r[15],net:r[16],pct:sp(r[17])},
        awareness:{start:r[18],exit:r[19],net:r[20]},
        dataCollection:{start:r[21],exit:r[22],net:r[23]},
        verification:{start:r[24],exit:r[25],net:r[26]}});}}
  const wgs=[];
  const ws=wb.Sheets['Workgroup Scorecard'];
  if(ws){const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
    for(let i=4;i<rows.length;i++){const r=rows[i];if(!r||!r[0])continue;const name=String(r[0]).trim();if(!name)continue;
      wgs.push({name,rag:sp(r[1]),comment:sp(r[2]),wgType:wgTypeMap?wgTypeMap[name]||null:null,
        decision:{start:r[3],exit:r[4],net:r[5],pct:sp(r[6])},
        awareness:{start:r[7],exit:r[8],net:r[9]},
        dataCollection:{start:r[10],exit:r[11],net:r[12]},
        verification:{start:r[13],exit:r[14],net:r[15]},
        monthly:{may:r[16],jun:r[17],jul:r[18],aug:r[19]}});}}
  return{apps,workgroups:wgs};
}
function parseOrionTasks(wb){
  const ws=wb.Sheets['Export'];if(!ws)return null;
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});if(!rows.length)return null;
  const hdr=rows[0],col={};
  hdr.forEach((h,i)=>{if(h)col[String(h).trim()]=i;});
  const apps={};
  for(let i=1;i<rows.length;i++){
    const r=rows[i];if(!r||!r[col['Task Id*']])continue;
    const status=qc(r[col['Status*']]);
    const wave=qc(r[col['Wave*']]);
    const app=qc(r[11]);// col L = primary/owning application
    if(!app)continue;
    const isComplete=status==='Complete';
    const isBw1=wave==='Build Wave 1';
    if(!apps[app])apps[app]={total:0,bw1:0};
    if(!isComplete)apps[app].total++;
    if(isBw1&&!isComplete)apps[app].bw1++;
  }
  return apps;
}
function parseOrionBBs(wb){
  const ws=wb.Sheets['Export'];if(!ws)return null;
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});if(!rows.length)return null;
  const hdr=rows[0],col={};
  hdr.forEach((h,i)=>{if(h)col[String(h).trim()]=i;});
  const bbTypes=['Decision','Awareness','Data Collection','Verification'];
  const init=()=>Object.fromEntries(bbTypes.map(t=>[t,0]));
  const apps={},wgs={};
  for(let i=1;i<rows.length;i++){
    const r=rows[i];if(!r||!r[col['Building Block Id']])continue;
    const status=qc(r[col['Status']]);
    const type=qc(r[col['Type']]);
    if(!bbTypes.includes(type)||status==='Complete')continue;
    const appsRaw=r[col['Applications']];
    if(appsRaw)String(appsRaw).split(';').map(qc).filter(Boolean).forEach(a=>{
      if(!apps[a])apps[a]=init();apps[a][type]++;
    });
    const wgsRaw=r[col['Reviewer: Workgroup']];
    if(wgsRaw)String(wgsRaw).split(';').map(qc).filter(Boolean).forEach(w=>{
      if(!wgs[w])wgs[w]=init();wgs[w][type]++;
    });
  }
  return{apps,wgs};
}
function parseWgTypes(wb){
  const ws=wb.Sheets['Export'];if(!ws)return null;
  const rows=XLSX.utils.sheet_to_json(ws,{header:0,defval:null});
  const map={};
  rows.forEach(r=>{if(r['Name']&&r['Type']){map[String(r['Name']).trim().replace(/^"+|"+$/g,'')]=String(r['Type']).trim().replace(/^"+|"+$/g,'');}});
  return Object.keys(map).length?map:null;
}

// ── Main App ────────────────────────────────────────────────────────────
function App() {
  const [data,setData]=React.useState(BD);
  const [tab,setTab]=React.useState('apps');
  const [search,setSearch]=React.useState('');
  const [showExc,setShowExc]=React.useState(true);
  const [compact,setCompact]=React.useState(false);
  const [sortKey,setSortKey]=React.useState('rag');
  const [sortDir,setSortDir]=React.useState('asc');
  const [labels,setLabels]=React.useState(loadLabels);
  const [colFilters,setColFilters]=React.useState({});
  const [openFilter,setOpenFilter]=React.useState(null);
  const [filterPos,setFilterPos]=React.useState({top:0,left:0});
  const [wgTypeMap,setWgTypeMap]=React.useState(null);
  const [dragging,setDragging]=React.useState(false);
  const fileRef=React.useRef();

  // Close filter dropdown on outside click
  React.useEffect(()=>{
    const h=()=>setOpenFilter(null);
    document.addEventListener('click',h);
    return()=>document.removeEventListener('click',h);
  },[]);

  const openFilt=(fk,e)=>{
    e.stopPropagation();
    e.nativeEvent&&e.nativeEvent.stopImmediatePropagation();
    if(openFilter===fk){setOpenFilter(null);return;}
    const rect=e.currentTarget.getBoundingClientRect();
    setFilterPos({top:rect.bottom+2,left:Math.min(rect.left,window.innerWidth-200)});
    setOpenFilter(fk);
  };

  const handleFile=file=>{
    if(!file)return;
    const ext=file.name.split('.').pop().toLowerCase();
    if(!['xlsx','xls'].includes(ext)){alert('Please upload an .xlsx or .xls file.');return;}
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        if(wb.SheetNames.includes('Export')&&!wb.SheetNames.includes('App Scorecard')){
          // Detect Orion export type by first header cell
          const expWs=wb.Sheets['Export'];
          const firstRow=(XLSX.utils.sheet_to_json(expWs,{header:1,defval:null,range:'A1:BQ1'})[0]||[]).map(h=>h?String(h).trim():'');
          if(firstRow.includes('Task Id*')){
            // ── Orion Tasks export ──
            const tc=parseOrionTasks(wb);
            if(!tc){alert('Could not parse Tasks export.');return;}
            setData(d=>({...d,importedAt:new Date().toISOString(),fileName:file.name,
              apps:d.apps.map(app=>{
                const t=tc[app.name];if(!t)return app;
                const aStart=app.allTasks?.start??t.total;
                const bStart=app.bw1Tasks?.start??t.bw1;
                const aPct=calcPct(aStart,t.total);
                const bPct=calcPct(bStart,t.bw1);
                return{...app,
                  allTasks:{...app.allTasks,exit:t.total,net:t.total-aStart,pct:aPct},
                  bw1Tasks:{...app.bw1Tasks,exit:t.bw1,net:t.bw1-bStart,pct:bPct},
                  rag:calcAppRag(aPct,app.decision?.pct)};
              })
            }));
            alert('Tasks updated from '+file.name+'. '+Object.keys(tc).length+' apps found.');
          } else if(firstRow.includes('Building Block Id')){
            // ── Orion Building Blocks export ──
            const bb=parseOrionBBs(wb);
            if(!bb){alert('Could not parse Building Blocks export.');return;}
            setData(d=>({...d,importedAt:new Date().toISOString(),fileName:file.name,
              apps:d.apps.map(app=>{
                const bc=bb.apps[app.name];if(!bc)return app;
                const dS=app.decision?.start??bc.Decision;
                const dPct=calcPct(dS,bc.Decision);
                return{...app,
                  decision:{start:dS,exit:bc.Decision,net:bc.Decision-dS,pct:dPct},
                  awareness:{start:app.awareness?.start??bc.Awareness,exit:bc.Awareness,net:bc.Awareness-(app.awareness?.start??bc.Awareness)},
                  dataCollection:{start:app.dataCollection?.start??bc['Data Collection'],exit:bc['Data Collection'],net:bc['Data Collection']-(app.dataCollection?.start??bc['Data Collection'])},
                  verification:{start:app.verification?.start??bc.Verification,exit:bc.Verification,net:bc.Verification-(app.verification?.start??bc.Verification)},
                  rag:calcAppRag(app.allTasks?.pct,dPct)};
              }),
              workgroups:d.workgroups.map(wg=>{
                const bc=bb.wgs[wg.name];if(!bc)return wg;
                const dS=wg.decision?.start??bc.Decision;
                const dPct=calcPct(dS,bc.Decision);
                return{...wg,
                  decision:{start:dS,exit:bc.Decision,net:bc.Decision-dS,pct:dPct},
                  awareness:{start:wg.awareness?.start??bc.Awareness,exit:bc.Awareness,net:bc.Awareness-(wg.awareness?.start??bc.Awareness)},
                  dataCollection:{start:wg.dataCollection?.start??bc['Data Collection'],exit:bc['Data Collection'],net:bc['Data Collection']-(wg.dataCollection?.start??bc['Data Collection'])},
                  verification:{start:wg.verification?.start??bc.Verification,exit:bc.Verification,net:bc.Verification-(wg.verification?.start??bc.Verification)},
                  rag:calcWgRag(dPct)};
              })
            }));
            alert('Building Blocks updated from '+file.name+'. '+Object.keys(bb.apps).length+' apps, '+Object.keys(bb.wgs).length+' workgroups found.');
          } else {
            // ── Workgroup types (Initial Exit - Workgroups) ──
            const map=parseWgTypes(wb);if(!map){alert('Could not read workgroup types.');return;}
            setWgTypeMap(map);
            setData(d=>({...d,workgroups:d.workgroups.map(wg=>({...wg,wgType:map[wg.name]||wg.wgType}))}));
            alert('Workgroup types updated from '+file.name);
          }
        } else {
          const parsed=parseScorecard(wb,wgTypeMap||{});
          if(!parsed.apps.length&&!parsed.workgroups.length){alert('No data found. Expected sheets: "App Scorecard" / "Workgroup Scorecard".');return;}
          setData({...parsed,importedAt:new Date().toISOString(),fileName:file.name});
          setColFilters({});
        }
      }catch(err){alert('Error: '+err.message);}
    };
    reader.readAsArrayBuffer(file);
  };

  const onDrop=e=>{e.preventDefault();setDragging(false);handleFile(e.dataTransfer.files[0]);};
  const saveLabel=(itype,name,val)=>{
    setLabels(prev=>{
      const n={apps:{...prev.apps},workgroups:{...prev.workgroups}};
      if(val)n[itype][name]=val; else delete n[itype][name];
      saveLabels(n);return n;
    });
  };

  const itemType=tab==='apps'?'apps':'workgroups';
  const raw=tab==='apps'?data.apps:data.workgroups;

  const ragCounts=React.useMemo(()=>{
    const c={GREEN:0,AMBER:0,RED:0,total:0};
    raw.forEach(i=>{if(i.rag==='GREEN'||i.rag==='AMBER'||i.rag==='RED'){c[i.rag]++;c.total++;}});
    return c;
  },[raw]);

  const items=React.useMemo(()=>{
    let arr=raw;
    // Text search
    const q=search.trim().toLowerCase();
    if(q) arr=arr.filter(i=>i.name.toLowerCase().includes(q)||(labels[itemType]?.[i.name]||'').toLowerCase().includes(q));
    // Show exceptions
    if(!showExc) arr=arr.filter(i=>!i.comment);
    // Column filters
    const cf=colFilters;
    if(cf.rag&&cf.rag.size>0)       arr=arr.filter(i=>cf.rag.has(i.rag));
    if(cf.type&&cf.type.size>0)     arr=arr.filter(i=>cf.type.has(i.wgType||''));
    if(cf.label&&cf.label.size>0)   arr=arr.filter(i=>{const l=labels[itemType]?.[i.name]||'';if(!l)return cf.label.has('(No label)');return cf.label.has(l);});
    if(cf.decNetCat&&cf.decNetCat.size>0) arr=arr.filter(i=>cf.decNetCat.has(netCat(i.decision?.net)));
    if(cf.decPctCat&&cf.decPctCat.size>0) arr=arr.filter(i=>cf.decPctCat.has(pctCat(i.decision?.pct)));
    if(cf.allNetCat&&cf.allNetCat.size>0) arr=arr.filter(i=>cf.allNetCat.has(netCat(i.allTasks?.net)));
    if(cf.allPctCat&&cf.allPctCat.size>0) arr=arr.filter(i=>cf.allPctCat.has(pctCat(i.allTasks?.pct)));
    // Sort
    arr=[...arr].sort((a,b)=>{
      const D=sortDir==='asc'?1:-1;
      if(sortKey==='name')  return D*a.name.localeCompare(b.name);
      if(sortKey==='rag')   return D*(ragOrd(a.rag)-ragOrd(b.rag));
      if(sortKey==='type')  return D*(typeOrd(a.wgType)-typeOrd(b.wgType));
      if(sortKey==='label'){const al=labels[itemType]?.[a.name]||'';const bl=labels[itemType]?.[b.name]||'';return D*al.localeCompare(bl);}
      const fields={allExit:x=>x.allTasks?.exit,allNet:x=>x.allTasks?.net,allPct:x=>parsePct(x.allTasks?.pct),
                    bw1Pct:x=>parsePct(x.bw1Tasks?.pct),
                    decExit:x=>x.decision?.exit,decNet:x=>x.decision?.net,decPct:x=>parsePct(x.decision?.pct)};
      const fn=fields[sortKey];if(!fn)return D*a.name.localeCompare(b.name);
      let av=fn(a),bv=fn(b);const INF=sortDir==='asc'?Infinity:-Infinity;
      if(av===null||av===undefined)av=INF;if(bv===null||bv===undefined)bv=INF;
      return D*(av-bv);
    });
    return arr;
  },[raw,search,showExc,colFilters,sortKey,sortDir,labels,itemType]);

  const tSort=key=>{if(sortKey===key)setSortDir(d=>d==='asc'?'desc':'asc');else{setSortKey(key);setSortDir('asc');}};

  // Active filter chips
  const FILT_LABELS={'rag':'RAG','type':'Type','label':'Label','decNetCat':'Decision Net','decPctCat':'Decision %','allNetCat':'All Tasks Net','allPctCat':'All Tasks %'};
  const activeFilters=Object.entries(colFilters).filter(([,s])=>s&&s.size>0);

  const importedLabel=data.importedAt
    ?`${data.fileName||'Uploaded'} \u2014 `+new Date(data.importedAt).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})
    :'Baseline data \u2014 22 Apr 2026';

  const pct=n=>ragCounts.total?Math.round(n/ragCounts.total*100)+'%':'\u2014';

  const switchTab=t=>{setTab(t);setColFilters({});setSearch('');};

  const shProps={sortKey,tSort,colFilters,openFilt};

  return (
    <div onDragOver={e=>{e.preventDefault();setDragging(true);}} onDragLeave={()=>setDragging(false)} onDrop={onDrop}
      onClick={()=>openFilter&&setOpenFilter(null)}>
      {dragging&&<div className="drop-ov"><div className="drop-box"><h2>&#8595; Drop Scorecard Excel</h2><p>Release to import the LGT Orion Scorecard or Workgroup Types file</p></div></div>}

      {openFilter&&(
        <FilterDrop colKey={openFilter} items={raw} labels={labels} itemType={itemType}
          colFilters={colFilters} setColFilters={setColFilters}
          pos={filterPos} onClose={()=>setOpenFilter(null)} />
      )}

      <div className="hdr">
        <div><h1>LGT &#8212; Orion Exit Scorecard</h1><div className="hdr-sub">{importedLabel}</div></div>
        <button className="btn-import" onClick={()=>fileRef.current.click()}>&#8595; Import (.xlsx)</button>
        <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={e=>{handleFile(e.target.files[0]);e.target.value='';}} />
      </div>

      <div className="tabs">
        <div className={'tab'+(tab==='apps'?' active':'')} onClick={()=>switchTab('apps')}>Applications ({data.apps.length})</div>
        <div className={'tab'+(tab==='workgroups'?' active':'')} onClick={()=>switchTab('workgroups')}>Workgroups ({data.workgroups.length})</div>
      </div>

      <div className="rag-row">
        {[{k:'ALL',lbl:'All',cnt:raw.length,p:null,c:'c-all',d:'ALL'},
          {k:'GREEN',lbl:'Green',cnt:ragCounts.GREEN,p:pct(ragCounts.GREEN),c:'c-green',d:'GREEN'},
          {k:'AMBER',lbl:'Amber',cnt:ragCounts.AMBER,p:pct(ragCounts.AMBER),c:'c-amber',d:'AMBER'},
          {k:'RED',  lbl:'Red',  cnt:ragCounts.RED,  p:pct(ragCounts.RED),  c:'c-red',  d:'RED'},
        ].map(({k,lbl,cnt,p,c,d})=>(
          <div key={k} className={'rag-card '+c+((colFilters.rag?.size===0||!colFilters.rag)?k==='ALL'?'':'':(colFilters.rag?.has(k)&&colFilters.rag?.size===1?' ac':''))+' '+(k==='ALL'&&(!colFilters.rag||colFilters.rag.size===0)?' ac':'')}
            onClick={()=>{
              if(k==='ALL') setColFilters(p=>({...p,rag:new Set()}));
              else setColFilters(p=>({...p,rag:new Set([k])}));
            }}>
            <div className={'rag-dot rag-dot-'+d}></div>
            <div><div className="rc-count">{cnt}</div><div className="rc-label">{lbl}</div>{p&&<div className="rc-pct">{p}</div>}</div>
          </div>
        ))}
      </div>

      <div className="criteria">
        <span className="cg">&#9632; GREEN</span>: &gt;30% reduction &nbsp;
        <span className="ca">&#9632; AMBER</span>: 15&#8211;30% &nbsp;
        <span className="cr">&#9632; RED</span>: &lt;15% or increase
      </div>

      <div className="fbar">
        <input className="search" type="text" placeholder="&#128269; Search name or label&#8230;" value={search} onChange={e=>setSearch(e.target.value)} />
        <label className="chk-lbl"><input type="checkbox" checked={showExc} onChange={e=>setShowExc(e.target.checked)} /> Show Exceptions / Pillars</label>
        <span className="count-txt">{items.length} of {raw.length} shown</span>
        <div className="fbar-right">
          <button className={'btn-sm'+(compact?'':' on')} onClick={()=>setCompact(false)}>Full</button>
          <button className={'btn-sm'+(compact?' on':'')} onClick={()=>setCompact(true)}>Compact</button>
        </div>
      </div>

      {activeFilters.length>0&&(
        <div className="active-filters">
          <span>Active filters:</span>
          {activeFilters.map(([fk,s])=>(
            <span key={fk} className="filter-chip" onClick={()=>setColFilters(p=>{const n={...p};delete n[fk];return n;})}>
              {FILT_LABELS[fk]}: {[...s].join(', ')} &#10005;
            </span>
          ))}
          <span className="clear-all" onClick={()=>setColFilters({})}>Clear all filters</span>
        </div>
      )}

      <div className="tbl-wrap" onClick={e=>e.stopPropagation()}>
        {tab==='apps'
          ? <AppTable items={items} compact={compact} shProps={shProps} labels={labels} saveLabel={saveLabel} />
          : <WgTable  items={items} compact={compact} shProps={shProps} labels={labels} saveLabel={saveLabel} />
        }
        {items.length===0&&<div className="empty">No items match your filters.</div>}
      </div>
    </div>
  );
}

function WgTable({items,compact,shProps,labels,saveLabel}) {
  const {sortKey,tSort,colFilters,openFilt}=shProps;
  const sh=(label,sk,fk,cls,sty)=><SH label={label} sk={sk} fk={fk} sortKey={sortKey} tSort={tSort} colFilters={colFilters} openFilt={openFilt} className={cls} style={sty}/>;
  return (
    <table>
      <thead>
        <tr>
          <th className="name-h sh" rowSpan={2}>
            <div className="sh-inner">
              <div className={'sh-sort'+(sortKey==='name'?' sa':'')} onClick={()=>tSort('name')}>Workgroup <span className="si">{sortKey==='name'?'\u2195':'\u21C5'}</span></div>
            </div>
          </th>
          <th className="rag-h sh" rowSpan={2}>
            <div className="sh-inner" style={{justifyContent:'center'}}>
              <div className={'sh-sort'+(sortKey==='rag'?' sa':'')} onClick={()=>tSort('rag')} style={{justifyContent:'center'}}>RAG <span className="si">{sortKey==='rag'?'\u2195':'\u21C5'}</span></div>
              <div className={'sh-filt'+(colFilters.rag?.size>0?' fa':'')} onClick={e=>openFilt('rag',e)}>&#9660;</div>
            </div>
          </th>
          <th className="type-h sh" rowSpan={2}>
            <div className="sh-inner">
              <div className={'sh-sort'+(sortKey==='type'?' sa':'')} onClick={()=>tSort('type')}>Type <span className="si">{sortKey==='type'?'\u2195':'\u21C5'}</span></div>
              <div className={'sh-filt'+(colFilters.type?.size>0?' fa':'')} onClick={e=>openFilt('type',e)}>&#9660;</div>
            </div>
          </th>
          <th className="lbl-h sh" rowSpan={2}>
            <div className="sh-inner">
              <div className={'sh-sort'+(sortKey==='label'?' sa':'')} onClick={()=>tSort('label')}>Label <span className="si">{sortKey==='label'?'\u2195':'\u21C5'}</span></div>
              <div className={'sh-filt'+(colFilters.label?.size>0?' fa':'')} onClick={e=>openFilt('label',e)}>&#9660;</div>
            </div>
          </th>
          <th className="grp ga" colSpan={compact?3:4}>Decision BBs</th>
          {!compact&&<>
            <th className="grp gb" colSpan={3}>Awareness</th>
            <th className="grp ga" colSpan={3}>Data Collection</th>
            <th className="grp gb" colSpan={3}>Verification</th>
            <th className="grp ga" colSpan={4}>Monthly Targets</th>
          </>}
        </tr>
        <tr>
          <th className="sh-plain ga-cell">Start</th>
          {sh('Exit','decExit',null,'ga-cell')}
          {sh('Net','decNet','decNetCat','ga-cell')}
          {sh('% Red','decPct','decPctCat','ga-cell gsep')}
          {!compact&&<>
            <th className="sh-plain gb-cell">Start</th>
            {sh('Exit',null,null,'gb-cell')}
            {sh('Net',null,null,'gb-cell gsep')}
            <th className="sh-plain ga-cell">Start</th>
            {sh('Exit',null,null,'ga-cell')}
            {sh('Net',null,null,'ga-cell gsep')}
            <th className="sh-plain gb-cell">Start</th>
            {sh('Exit',null,null,'gb-cell')}
            {sh('Net',null,null,'gb-cell gsep')}
            <th className="sh-plain ga-cell">May</th>
            {sh('Jun',null,null,'ga-cell')}
            {sh('Jul',null,null,'ga-cell')}
            {sh('Aug',null,null,'ga-cell')}
          </>}
        </tr>
      </thead>
      <tbody>
        {items.map((wg,i)=>(
          <tr key={wg.name+i} className={ragRowCls(wg.rag)}>
            <td className="name-c">{wg.name}{wg.comment==='Pillar'&&<span className="plr-badge">PILLAR</span>}{wg.comment&&wg.comment!=='Pillar'&&<span className="exc-badge">{wg.comment.toUpperCase()}</span>}</td>
            <td className="rag-c"><span className={'rag-badge rb-'+wg.rag}>{wg.rag}</span></td>
            <td className="type-c">{wg.wgType&&<span className={'type-pill tp-'+typeCls(wg.wgType)}>{wg.wgType}</span>}</td>
            <LabelCell itemType="workgroups" name={wg.name} labels={labels} onSave={saveLabel}/>
            <td className="ga-cell"><Num n={wg.decision?.start}/></td>
            <td className="ga-cell"><Num n={wg.decision?.exit}/></td>
            <td className="ga-cell" style={netBg(wg.decision?.net)}><NetV n={wg.decision?.net}/></td>
            <td className="ga-cell gsep" style={pctBg(wg.decision?.pct)}><PctV s={wg.decision?.pct}/></td>
            {!compact&&<>
              <td className="gb-cell"><Num n={wg.awareness?.start}/></td>
              <td className="gb-cell"><Num n={wg.awareness?.exit}/></td>
              <td className="gb-cell gsep" style={netBg(wg.awareness?.net)}><NetV n={wg.awareness?.net}/></td>
              <td className="ga-cell"><Num n={wg.dataCollection?.start}/></td>
              <td className="ga-cell"><Num n={wg.dataCollection?.exit}/></td>
              <td className="ga-cell gsep" style={netBg(wg.dataCollection?.net)}><NetV n={wg.dataCollection?.net}/></td>
              <td className="gb-cell"><Num n={wg.verification?.start}/></td>
              <td className="gb-cell"><Num n={wg.verification?.exit}/></td>
              <td className="gb-cell gsep" style={netBg(wg.verification?.net)}><NetV n={wg.verification?.net}/></td>
              <td className="ga-cell">{wg.monthly?.may!=null?wg.monthly.may:<span className="vnil">&#8212;</span>}</td>
              <td className="ga-cell">{wg.monthly?.jun!=null?wg.monthly.jun:<span className="vnil">&#8212;</span>}</td>
              <td className="ga-cell">{wg.monthly?.jul!=null?wg.monthly.jul:<span className="vnil">&#8212;</span>}</td>
              <td className="ga-cell">{wg.monthly?.aug!=null?wg.monthly.aug:<span className="vnil">&#8212;</span>}</td>
            </>}
          </tr>
        ))}
      </tbody>
    </table>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
